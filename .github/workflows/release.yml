name: Release

# Production binary for the forked grok-build (plugin-hooks-on-spawn patch).
# Target: macOS Apple Silicon only (aarch64-apple-darwin).
#
# Trigger:
#   - push tag v*  (e.g. v0.2.110-plugin-hooks.1)
#   - workflow_dispatch with tag input
#
# GitHub-hosted runners only (no self-hosted fleet required).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.110-plugin-hooks.1)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'

jobs:
  build-and-release:
    name: build macOS aarch64 + GitHub Release
    runs-on: macos-14
    timeout-minutes: 360
    steps:
      - name: Resolve tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            echo "::error::No tag: push a v* tag or pass workflow_dispatch.tag"
            exit 1
          fi
          case "$tag" in
            v*) ;;
            *) echo "::error::Tag must start with v (got $tag)"; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

      - name: Install build deps (protoc)
        shell: bash
        run: |
          set -euo pipefail
          # bin/protoc is a dotslash wrapper; CI runners lack both protoc and
          # dotslash. Homebrew protoc on PATH is enough for xai-proto-build.
          brew list protobuf &>/dev/null || brew install protobuf
          protoc --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.92.0'
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-aarch64-apple-darwin
          cache-targets: true

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release -p xai-grok-pager-bin --locked 2>/dev/null || \
            cargo build --release -p xai-grok-pager-bin

      - name: Package artifact
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          src="target/release/xai-grok-pager"
          if [ ! -f "$src" ]; then
            echo "::error::missing binary at $src"
            ls -la target/release/ || true
            exit 1
          fi
          cp "$src" dist/grok
          chmod +x dist/grok
          tar -C dist -czf dist/grok-macos-aarch64.tar.gz grok
          shasum -a 256 dist/grok-macos-aarch64.tar.gz | tee dist/SHA256SUMS
          ls -la dist/

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
          VERSION: ${{ steps.ver.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          notes="$RUNNER_TEMP/notes.md"
          cat > "$notes" <<EOF
          ## grok ${VERSION} (fork)

          Production build of [jonasvanderhaegen/grok-build](https://github.com/jonasvanderhaegen/grok-build).

          ### Highlights

          - **Plugin hooks loaded at session spawn**
          - **MCP tools/call progress** through Progressive `use_tool` (live tool-row updates from `notifications/progress`)

          ### Asset

          | Platform | Asset |
          |----------|--------|
          | macOS Apple Silicon | \`grok-macos-aarch64.tar.gz\` |

          Verify: \`shasum -a 256 -c SHA256SUMS\`

          ### Install

          \`\`\`bash
          bash scripts/install-from-release.sh ${TAG}
          \`\`\`

          Or manually:

          \`\`\`bash
          curl -fsSL -o /tmp/grok.tgz \\
            "https://github.com/jonasvanderhaegen/grok-build/releases/download/${TAG}/grok-macos-aarch64.tar.gz"
          mkdir -p ~/.grok/downloads ~/.grok/bin
          tar -xzf /tmp/grok.tgz -C /tmp
          install -m 755 /tmp/grok ~/.grok/downloads/grok-${VERSION}-macos-aarch64
          ln -sfn ~/.grok/downloads/grok-${VERSION}-macos-aarch64 ~/.grok/bin/grok
          ln -sfn ~/.grok/downloads/grok-${VERSION}-macos-aarch64 ~/.grok/bin/agent
          ~/.grok/bin/grok --version
          \`\`\`

          Start a **new** grok session after install so plugin hooks and MCP progress wiring load at cold start.
          EOF
          EOF

          assets=(
            dist/grok-macos-aarch64.tar.gz
            dist/SHA256SUMS
          )

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber "${assets[@]}"
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file "$notes"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "grok ${VERSION}" \
              --notes-file "$notes" \
              "${assets[@]}"
          fi
