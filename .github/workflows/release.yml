name: Release

# Production binaries for the forked grok-build (plugin-hooks + MCP progress).
# Targets: macOS Apple Silicon (aarch64-apple-darwin) + Windows 11 x86_64 (x86_64-pc-windows-msvc).
#
# Trigger:
#   - push tag v*  (e.g. v0.2.110-mcp-progress.1)
#   - workflow_dispatch with tag input (builds from selected branch SHA)
#
# GitHub-hosted runners only — never cargo --release on a developer laptop.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.110-mcp-progress.1)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: '0'
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: 'true'

jobs:
  resolve-tag:
    name: Resolve tag
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve tag
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.ref_type }}" = "tag" ]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            echo "::error::No tag: push a v* tag or pass workflow_dispatch.tag"
            exit 1
          fi
          case "$tag" in
            v*) ;;
            *) echo "::error::Tag must start with v (got $tag)"; exit 1 ;;
          esac
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

  build-macos-aarch64:
    name: build macOS aarch64
    runs-on: macos-14
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Tag push: build the tagged commit. Dispatch: build selected branch tip
          # (so workflow fixes can re-cut a release without retagging).
          ref: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

      - name: Install protoc (prebuilt, skip brew)
        shell: bash
        run: |
          set -euo pipefail
          # bin/protoc is a dotslash wrapper; runners lack protoc + dotslash.
          # Prebuilt zip is much faster than `brew install protobuf`.
          PROTOC_VERSION=28.3
          curl -fsSL -o /tmp/protoc.zip \
            "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-osx-aarch_64.zip"
          sudo unzip -qo /tmp/protoc.zip -d /usr/local bin/protoc
          sudo unzip -qo /tmp/protoc.zip -d /usr/local 'include/*'
          protoc --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.92.0'

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-aarch64-apple-darwin-v2
          cache-targets: true
          cache-on-failure: true

      - name: Build release binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release -p xai-grok-pager-bin --locked 2>/dev/null || \
            cargo build --release -p xai-grok-pager-bin
          sccache --show-stats || true

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          src="target/release/xai-grok-pager"
          if [ ! -f "$src" ]; then
            echo "::error::missing binary at $src"
            ls -la target/release/ || true
            exit 1
          fi
          cp "$src" dist/grok
          chmod +x dist/grok
          tar -C dist -czf dist/grok-macos-aarch64.tar.gz grok
          shasum -a 256 dist/grok-macos-aarch64.tar.gz | tee dist/SHA256SUMS
          ls -la dist/

      - name: Upload build artifact (survives release-notes failures)
        uses: actions/upload-artifact@v4
        with:
          name: grok-macos-aarch64
          path: |
            dist/grok-macos-aarch64.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  build-windows-x86_64:
    name: build Windows x86_64
    runs-on: windows-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

      - name: Install protoc (prebuilt)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "28.3"
          $zip = Join-Path $env:RUNNER_TEMP "protoc.zip"
          Invoke-WebRequest -Uri "https://github.com/protocolbuffers/protobuf/releases/download/v$version/protoc-$version-win64.zip" -OutFile $zip
          $dest = Join-Path $env:RUNNER_TEMP "protoc"
          Expand-Archive -Path $zip -DestinationPath $dest -Force
          Add-Content -Path $env:GITHUB_PATH -Value (Join-Path $dest "bin")
          & (Join-Path $dest "bin\protoc.exe") --version

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.92.0'

      - name: sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-x86_64-pc-windows-msvc-v2
          cache-targets: true
          cache-on-failure: true

      - name: Build release binary
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo build --release -p xai-grok-pager-bin --locked
          if ($LASTEXITCODE -ne 0) {
            cargo build --release -p xai-grok-pager-bin
          }
          sccache --show-stats

      - name: Package artifact
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $src = "target\release\xai-grok-pager.exe"
          if (-not (Test-Path $src)) {
            Write-Error "missing binary at $src"
            Get-ChildItem target\release\
            exit 1
          }
          Copy-Item $src dist\grok.exe -Force
          Compress-Archive -Path dist\grok.exe -DestinationPath dist\grok-windows-x86_64.zip -Force
          $hash = (Get-FileHash dist\grok-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  grok-windows-x86_64.zip" | Out-File -FilePath dist\SHA256SUMS -Encoding ascii -NoNewline
          Add-Content -Path dist\SHA256SUMS -Value ""
          Get-ChildItem dist

      - name: Upload build artifact (survives release-notes failures)
        uses: actions/upload-artifact@v4
        with:
          name: grok-windows-x86_64
          path: |
            dist/grok-windows-x86_64.zip
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Create or update GitHub Release
    needs: [resolve-tag, build-macos-aarch64, build-windows-x86_64]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: grok-macos-aarch64
          path: dist/macos

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: grok-windows-x86_64
          path: dist/windows

      - name: Assemble release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          cp dist/macos/grok-macos-aarch64.tar.gz dist/
          cp dist/windows/grok-windows-x86_64.zip dist/
          cat dist/macos/SHA256SUMS dist/windows/SHA256SUMS > dist/SHA256SUMS
          ls -la dist/
          cat dist/SHA256SUMS

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.resolve-tag.outputs.tag }}
          VERSION: ${{ needs.resolve-tag.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          notes="$RUNNER_TEMP/notes.md"
          cat > "$notes" <<EOF
          ## grok ${VERSION} (fork)

          Production build of [jonasvanderhaegen/grok-build](https://github.com/jonasvanderhaegen/grok-build).

          ### Highlights

          - **Plugin hooks loaded at session spawn**
          - **MCP tools/call progress** through Progressive \`use_tool\` (live tool-row updates from \`notifications/progress\`)

          ### Asset

          | Platform | Asset |
          |----------|--------|
          | macOS Apple Silicon | \`grok-macos-aarch64.tar.gz\` |
          | Windows 11 x86_64 | \`grok-windows-x86_64.zip\` |

          Verify: \`shasum -a 256 -c SHA256SUMS\` (macOS/Linux) or check the matching line in \`SHA256SUMS\` with \`Get-FileHash\` (Windows)

          ### Install

          macOS:

          \`\`\`bash
          bash scripts/install-from-release.sh ${TAG}
          \`\`\`

          Or manually:

          \`\`\`bash
          curl -fsSL -o /tmp/grok.tgz \\
            "https://github.com/jonasvanderhaegen/grok-build/releases/download/${TAG}/grok-macos-aarch64.tar.gz"
          mkdir -p ~/.grok/downloads ~/.grok/bin
          tar -xzf /tmp/grok.tgz -C /tmp
          install -m 755 /tmp/grok ~/.grok/downloads/grok-${VERSION}-macos-aarch64
          ln -sfn ~/.grok/downloads/grok-${VERSION}-macos-aarch64 ~/.grok/bin/grok
          ln -sfn ~/.grok/downloads/grok-${VERSION}-macos-aarch64 ~/.grok/bin/agent
          ~/.grok/bin/grok --version
          \`\`\`

          Windows 11 (x86_64):

          \`\`\`powershell
          .\scripts\install-from-release.ps1 -Tag ${TAG}
          \`\`\`

          Start a **new** grok session after install so plugin hooks and MCP progress wiring load at cold start.
          EOF

          # Heredoc above indents with spaces; strip common leading whitespace for clean notes.
          # (GitHub renders fine either way; strip keeps the download box tidy.)
          sed -i '' 's/^          //' "$notes" 2>/dev/null || sed -i 's/^          //' "$notes"

          assets=(
            dist/grok-macos-aarch64.tar.gz
            dist/grok-windows-x86_64.zip
            dist/SHA256SUMS
          )

          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$TAG" --repo "$GITHUB_REPOSITORY" --clobber "${assets[@]}"
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file "$notes"
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "grok ${VERSION}" \
              --notes-file "$notes" \
              "${assets[@]}"
          fi
